version: '3.9'

services:
  # ─── PostgreSQL Database ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: study-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-studytracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studytracker}
      POSTGRES_DB: ${POSTGRES_DB:-study_tracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - study-tracker-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-studytracker}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Express/TypeScript API ────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: study-tracker-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-studytracker}:${POSTGRES_PASSWORD:-studytracker}@postgres:5432/${POSTGRES_DB:-study_tracker}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 4000
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    expose:
      - "4000"
    networks:
      - study-tracker-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ─── Next.js Frontend ──────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api/v1}
    container_name: study-tracker-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api/v1}
      NODE_ENV: production
    expose:
      - "3000"
    networks:
      - study-tracker-net

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: study-tracker-nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    networks:
      - study-tracker-net

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  nginx_logs:
    driver: local

# ─── Networks ───────────────────────────────────────────────────────────────────
networks:
  study-tracker-net:
    driver: bridge
