version: '3.9'

# Production override — use with:
# docker-compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d

services:
  postgres:
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Do NOT expose port 5432 in production
    ports: []

  backend:
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    # Remove dev volume mounts in production
    volumes:
      - /app/node_modules
    # No direct port exposure — all traffic goes through nginx
    ports: []

  frontend:
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    # Remove dev volume mounts in production
    volumes:
      - /app/node_modules
      - /app/.next
    # No direct port exposure — all traffic goes through nginx
    ports: []

  nginx:
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment and provide SSL certs for HTTPS:
      # - ./nginx/certs/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      # - ./nginx/certs/privkey.pem:/etc/nginx/certs/privkey.pem:ro
      # For Let's Encrypt / Certbot:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
      # - certbot-webroot:/var/www/certbot:ro

# volumes:
#   certbot-webroot:
